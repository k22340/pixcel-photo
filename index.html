<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixcel Photo</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }

    .btn {
      padding: 8px 14px;
      background: rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    #modeBtns, #colorBtns {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 9999;
      flex-wrap: wrap;
      width: 260px;
    }

    #colorBtns {
      top: 80px;
    }

    #captureBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 3px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="view"></canvas>

<!-- ピクセル数切り替え -->
<div id="modeBtns">
  <div class="btn" onclick="setGrid(32)">32</div>
  <div class="btn" onclick="setGrid(48)">48</div>
  <div class="btn" onclick="setGrid(64)">64</div>
</div>

<!-- 色数制限切り替え -->
<div id="colorBtns">
  <div class="btn" onclick="setPalette('normal')">Normal</div>
  <div class="btn" onclick="setPalette('pico8')">PICO‑8</div>
  <div class="btn" onclick="setPalette('gb')">GB</div>
  <div class="btn" onclick="setPalette('nes')">NES</div>
  <div class="btn" onclick="setPalette('c64')">C64</div>
  <div class="btn" onclick="setPalette('msx')">MSX</div>
  <div class="btn" onclick="setPalette('hardBW')">HardBW</div>
  <div class="btn" onclick="setPalette('softBW')">SoftBW</div>
  <div class="btn" onclick="setPalette('filmBW')">FilmBW</div>
  <div class="btn" onclick="setPalette('silverBW')">Silver</div>
  <div class="btn" onclick="setPalette('sepia')">Sepia</div>
  <div class="btn" onclick="setPalette('grainBW')">GrainBW</div>
</div>

<!-- 撮影ボタン -->
<div id="captureBtn">📸</div>

<script>
let grid = 32;
let paletteMode = "normal";

const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");

let videoW = 640;
let videoH = 480;

let small = document.createElement("canvas");
let sctx = small.getContext("2d");

function setGrid(n) {
  grid = n;
  small.width = grid;
  small.height = grid;
  sctx = small.getContext("2d");
}

function setPalette(mode) {
  paletteMode = mode;
}

async function startCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: { ideal: 640 },
      height: { ideal: 480 },
      facingMode: "environment"
    },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    videoW = video.videoWidth;
    videoH = video.videoHeight;
  };
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

/* -------------------------
   パレット定義
--------------------------*/

// PICO‑8（16色）
const pico8 = [
  [0,0,0],[29,43,83],[126,37,83],[0,135,81],
  [171,82,54],[95,87,79],[194,195,199],[255,241,232],
  [255,0,77],[255,163,0],[255,236,39],[0,228,54],
  [41,173,255],[131,118,156],[255,119,168],[255,204,170]
];

// Game Boy（4色）
const gb = [
  [15,56,15],
  [48,98,48],
  [139,172,15],
  [155,188,15]
];

// NES（54色）
const nes = [
  [124,124,124],[0,0,252],[0,0,188],[68,40,188],[148,0,132],[168,0,32],
  [168,16,0],[136,20,0],[80,48,0],[0,120,0],[0,104,0],[0,88,0],
  [0,64,88],[0,0,0],[188,188,188],[0,120,248],[0,88,248],[104,68,252],
  [216,0,204],[228,0,88],[248,56,0],[228,92,16],[172,124,0],[0,184,0],
  [0,168,0],[0,168,68],[0,136,136],[0,0,0],[248,248,248],[60,188,252],
  [104,136,252],[152,120,248],[248,120,248],[248,88,152],[248,120,88],
  [252,160,68],[248,184,0],[184,248,24],[88,216,84],[88,248,152],
  [0,232,216],[120,120,120],[252,252,252],[164,228,252],[184,184,248],
  [216,184,248],[248,184,248],[248,164,192],[240,208,176],[252,224,168],
  [248,216,120],[216,248,120],[184,248,184],[184,248,216],[0,252,252]
];

// C64（16色）
const c64 = [
  [0,0,0],[255,255,255],[136,0,0],[170,255,238],
  [204,68,204],[0,204,85],[0,0,170],[238,238,119],
  [221,136,85],[102,68,0],[255,119,119],[51,51,51],
  [119,119,119],[170,255,102],[0,136,255],[187,187,187]
];

// MSX（15色）
const msx = [
  [0,0,0],[0,0,0],[33,200,66],[94,220,120],[84,85,237],
  [125,118,252],[212,82,77],[66,235,245],[252,85,84],
  [255,121,120],[212,193,84],[230,206,128],[33,176,59],
  [201,91,186],[204,204,204]
];

// コントラスト強め
const hardBW = [
  [0, 0, 0],
  [128, 128, 128],
  [255, 255, 255]
];

// 柔らかめ
const softBW = [
  [40, 40, 40],
  [120, 120, 120],
  [200, 200, 200]
];

// フィルム写真風（少し黄味）
const filmBW = [
  [20, 18, 12],
  [110, 100, 80],
  [220, 210, 180]
];

// 銀塩写真風（青みのある白黒）
const silverBW = [
  [10, 15, 25],
  [90, 105, 130],
  [200, 210, 230]
];

// セピア（茶色系の古写真）
const sepia = [
  [30, 20, 10],
  [120, 90, 60],
  [210, 180, 140]
];

// 高感度フィルム風（粒子強調用のベース）
const grainBW = [
  [0, 0, 0],
  [120, 120, 120],
  [240, 240, 240]
];

function nearestColor(r, g, b, palette) {
  let best = 0;
  let bestDist = 999999;

  for (let i = 0; i < palette.length; i++) {
    const [pr, pg, pb] = palette[i];
    const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }
  return palette[best];
}

function draw() {
  requestAnimationFrame(draw);

  if (video.readyState < 2) return;

  const camRatio = videoW / videoH;
  const gridRatio = 1;

  let drawW, drawH;

  if (camRatio > gridRatio) {
    drawW = grid;
    drawH = grid / camRatio;
  } else {
    drawH = grid;
    drawW = grid * camRatio;
  }

  const offsetX = (grid - drawW) / 2;
  const offsetY = (grid - drawH) / 2;

  sctx.clearRect(0, 0, grid, grid);
  sctx.drawImage(video, offsetX, offsetY, drawW, drawH);

  const img = sctx.getImageData(0, 0, grid, grid).data;

  const cell = Math.min(canvas.width / grid, canvas.height / grid);
  const px = (canvas.width - cell * grid) / 2;
  const py = (canvas.height - cell * grid) / 2;

  let i = 0;

  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {

      let r = img[i++];
      let g = img[i++];
      let b = img[i++];
      i++;

      // 色数制限
      if (paletteMode === "pico8")   [r, g, b] = nearestColor(r, g, b, pico8);
      if (paletteMode === "gb")      [r, g, b] = nearestColor(r, g, b, gb);
      if (paletteMode === "nes")     [r, g, b] = nearestColor(r, g, b, nes);
      if (paletteMode === "c64")     [r, g, b] = nearestColor(r, g, b, c64);
      if (paletteMode === "msx")     [r, g, b] = nearestColor(r, g, b, msx);
      if (paletteMode === "hardBW")  [r, g, b] = nearestColor(r, g, b, hardBW);
      if (paletteMode === "softBW")  [r, g, b] = nearestColor(r, g, b, softBW);
      if (paletteMode === "filmBW")  [r, g, b] = nearestColor(r, g, b, filmBW);
      if (paletteMode === "silverBW")[r, g, b] = nearestColor(r, g, b, silverBW);
      if (paletteMode === "sepia")   [r, g, b] = nearestColor(r, g, b, sepia);
      if (paletteMode === "grainBW") [r, g, b] = nearestColor(r, g, b, grainBW);

      // 高感度フィルム風：明るさノイズを追加
      if (paletteMode === "grainBW") {
        const noise = (Math.random() - 0.5) * 40; // ±20 くらい
        r = Math.max(0, Math.min(255, r + noise));
        g = Math.max(0, Math.min(255, g + noise));
        b = Math.max(0, Math.min(255, b + noise));
      }

      // 揺らぎ（粒子の揺れ）
      let jitter = cell * 0.1;
      if (paletteMode === "grainBW") {
        jitter = cell * 0.18; // 粒子感を強める
      }
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      const xPos = px + x * cell + jx;
      const yPos = py + y * cell + jy;

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.roundRect(xPos, yPos, cell, cell, cell * 0.3);
      ctx.fill();
    }
  }
}

// 撮影ボタン（年月日時分秒つき）
document.getElementById("captureBtn").onclick = () => {
  const now = new Date();
  const fileName =
    `pixcel_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_` +
    `${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}.png`;

  const link = document.createElement("a");
  link.download = fileName;
  link.href = canvas.toDataURL("image/png");
  link.click();
};

window.onresize = resize;

resize();
startCam();
draw();
</script>

</body>
</html>
