<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixLens風ピクセルカメラ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    #captureBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      border: 3px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="captureBtn">📸</div>

<script>

let capture;

// 通常モードのピクセルサイズ
let pixelSize = 16;

// PixLens＋モード（24×24固定）
let pixlensMode = false;

// 揺らぎの強さ
let jitter = 0.15;

// 角丸の強さ
let roundness = 0.35;

// ハロー（光の滲み）
let haloSize = 1.8;
let haloAlpha = 40;

function setup() {
  createCanvas(windowWidth, windowHeight);

  capture = createCapture({
    video: { facingMode: "environment" }
  });

  capture.hide();
  noStroke();

  // 撮影ボタン
  document.getElementById("captureBtn").addEventListener("click", () => {
    saveCanvas("pixlens_capture", "png");
  });
}

function draw() {
  background(0);

  if (pixlensMode) {
    drawPixlensMode();
  } else {
    drawNormalMode();
  }
}

//
// ▼ ハロー（光の滲み）
//
function drawHalo(x, y, w, h, r, col) {
  push();
  blendMode(ADD);
  fill(col[0], col[1], col[2], haloAlpha);

  let hw = w * haloSize;
  let hh = h * haloSize;

  rect(x - (hw - w) / 2, y - (hh - h) / 2, hw, hh, r * 1.5);
  pop();
}

//
// ▼ 通常モード
//
function drawNormalMode() {
  capture.size(width / pixelSize, height / pixelSize);
  capture.loadPixels();

  let w = capture.width;
  let h = capture.height;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {

      let i = (y * w + x) * 4;
      let col = [
        capture.pixels[i],
        capture.pixels[i + 1],
        capture.pixels[i + 2]
      ];

      let dx = x * pixelSize + random(-jitter, jitter) * pixelSize;
      let dy = y * pixelSize + random(-jitter, jitter) * pixelSize;

      let radius = pixelSize * roundness;

      drawHalo(dx, dy, pixelSize, pixelSize, radius, col);

      fill(col[0], col[1], col[2]);
      rect(dx, dy, pixelSize, pixelSize, radius);
    }
  }
}

//
// ▼ PixLens＋モード（24×24固定）
//
function drawPixlensMode() {
  const grid = 24;
  const cellW = width / grid;
  const cellH = height / grid;

  capture.size(grid, grid);
  capture.loadPixels();

  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {

      let i = (y * grid + x) * 4;
      let col = [
        capture.pixels[i],
        capture.pixels[i + 1],
        capture.pixels[i + 2]
      ];

      let dx = x * cellW + random(-jitter, jitter) * cellW;
      let dy = y * cellH + random(-jitter, jitter) * cellH;

      let radius = min(cellW, cellH) * roundness;

      drawHalo(dx, dy, cellW, cellH, radius, col);

      fill(col[0], col[1], col[2]);
      rect(dx, dy, cellW, cellH, radius);
    }
  }
}

//
// ▼ スワイプで通常モードの解像度変更
//
function touchMoved() {
  if (!pixlensMode) {
    pixelSize = constrain(pixelSize + (pmouseY - mouseY) * 0.1, 4, 40);
  }
}

//
// ▼ タップでモード切り替え
//
function touchStarted() {
  pixlensMode = !pixlensMode;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
