<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixcel Photo</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }

    #captureBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 3px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      z-index: 9999;
    }

    #modeBtns, #colorBtns {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }

    #colorBtns {
      top: 70px;
    }

    .modeBtn {
      padding: 8px 14px;
      background: rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="view"></canvas>

<!-- ピクセル数切り替え -->
<div id="modeBtns">
  <div class="modeBtn" onclick="setGrid(32)">32</div>
  <div class="modeBtn" onclick="setGrid(48)">48</div>
  <div class="modeBtn" onclick="setGrid(64)">64</div>
</div>

<!-- 色数制限切り替え -->
<div id="colorBtns">
  <div class="modeBtn" onclick="setPalette('normal')">Normal</div>
  <div class="modeBtn" onclick="setPalette('pico8')">PICO‑8</div>
  <div class="modeBtn" onclick="setPalette('gb')">GameBoy</div>
</div>

<!-- 撮影ボタン -->
<div id="captureBtn">📸</div>

<script>
let grid = 32;
let paletteMode = "normal";

const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");

let videoW = 640;
let videoH = 480;

let small = document.createElement("canvas");
let sctx = small.getContext("2d");

function setGrid(n) {
  grid = n;
  small.width = grid;
  small.height = grid;
  sctx = small.getContext("2d");
}

function setPalette(mode) {
  paletteMode = mode;
}

async function startCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: { ideal: 640 },
      height: { ideal: 480 },
      facingMode: "environment"
    },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    videoW = video.videoWidth;
    videoH = video.videoHeight;
  };
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ★ PICO‑8 パレット
const pico8 = [
  [0,0,0],[29,43,83],[126,37,83],[0,135,81],
  [171,82,54],[95,87,79],[194,195,199],[255,241,232],
  [255,0,77],[255,163,0],[255,236,39],[0,228,54],
  [41,173,255],[131,118,156],[255,119,168],[255,204,170]
];

// ★ Game Boy パレット（4色）
const gb = [
  [15,56,15],
  [48,98,48],
  [139,172,15],
  [155,188,15]
];

function nearestColor(r, g, b, palette) {
  let best = 0;
  let bestDist = 999999;

  for (let i = 0; i < palette.length; i++) {
    const [pr, pg, pb] = palette[i];
    const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }
  return palette[best];
}

function draw() {
  requestAnimationFrame(draw);

  if (video.readyState < 2) return;

  const camRatio = videoW / videoH;
  const gridRatio = 1;

  let drawW, drawH;

  if (camRatio > gridRatio) {
    drawW = grid;
    drawH = grid / camRatio;
  } else {
    drawH = grid;
    drawW = grid * camRatio;
  }

  const offsetX = (grid - drawW) / 2;
  const offsetY = (grid - drawH) / 2;

  sctx.clearRect(0, 0, grid, grid);
  sctx.drawImage(video, offsetX, offsetY, drawW, drawH);

  const img = sctx.getImageData(0, 0, grid, grid).data;

  const cell = Math.min(canvas.width / grid, canvas.height / grid);
  const px = (canvas.width - cell * grid) / 2;
  const py = (canvas.height - cell * grid) / 2;

  let i = 0;

  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {

      let r = img[i++];
      let g = img[i++];
      let b = img[i++];
      i++;

      // ★ 色数制限
      if (paletteMode === "pico8") {
        [r, g, b] = nearestColor(r, g, b, pico8);
      }
      if (paletteMode === "gb") {
        [r, g, b] = nearestColor(r, g, b, gb);
      }

      // ★ 揺らぎ（軽量）
      const jitter = cell * 0.1;
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      const xPos = px + x * cell + jx;
      const yPos = py + y * cell + jy;

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.roundRect(xPos, yPos, cell, cell, cell * 0.3);
      ctx.fill();
    }
  }
}

// 撮影ボタン（年月日時分秒つき）
document.getElementById("captureBtn").onclick = () => {
  const now = new Date();
  const fileName =
    `pixcel_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_` +
    `${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}.png`;

  const link = document.createElement("a");
  link.download = fileName;
  link.href = canvas.toDataURL("image/png");
  link.click();
};

window.onresize = resize;

resize();
startCam();
draw();
</script>

</body>
</html>
