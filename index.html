<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixcel Photo</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }

    #captureBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 3px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="view"></canvas>
<div id="captureBtn">📸</div>

<script>
const grid = 32;
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");

// 32×32 の縮小用キャンバス
const small = document.createElement("canvas");
small.width = grid;
small.height = grid;
const sctx = small.getContext("2d");

let videoW = 640;
let videoH = 480;

async function startCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: { ideal: 640 },
      height: { ideal: 480 },
      facingMode: "environment"
    },
    audio: false
  });

  video.srcObject = stream;

  // カメラの実際の解像度を取得
  video.onloadedmetadata = () => {
    videoW = video.videoWidth;
    videoH = video.videoHeight;
  };
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function draw() {
  requestAnimationFrame(draw);

  if (video.readyState < 2) return;

  // ★ カメラ映像のアスペクト比を保持して 32×32 に縮小
  const camRatio = videoW / videoH;
  const gridRatio = 1; // 32×32 は正方形

  let drawW, drawH;

  if (camRatio > gridRatio) {
    // カメラが横長 → 横を合わせる
    drawW = grid;
    drawH = grid / camRatio;
  } else {
    // カメラが縦長 → 縦を合わせる
    drawH = grid;
    drawW = grid * camRatio;
  }

  const offsetX = (grid - drawW) / 2;
  const offsetY = (grid - drawH) / 2;

  // 32×32 の中にアスペクト比を保って描画
  sctx.clearRect(0, 0, grid, grid);
  sctx.drawImage(video, offsetX, offsetY, drawW, drawH);

  const img = sctx.getImageData(0, 0, grid, grid).data;

  // ★ 正方形ピクセル
  const cell = Math.min(canvas.width / grid, canvas.height / grid);
  const px = (canvas.width - cell * grid) / 2;
  const py = (canvas.height - cell * grid) / 2;

  let i = 0;
  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {
      const r = img[i++];
      const g = img[i++];
      const b = img[i++];
      i++;

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(px + x * cell, py + y * cell, cell, cell);
    }
  }
}

// 撮影ボタン
document.getElementById("captureBtn").onclick = () => {
  const link = document.createElement("a");
  link.download = "pixcel_photo.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};

window.onresize = resize;

resize();
startCam();
draw();
</script>

</body>
</html>
