<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixLens 24x24 Camera</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="view"></canvas>

<script>
const grid = 24;
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");

// 24×24 の縮小用オフスクリーンキャンバス
const small = document.createElement("canvas");
small.width = grid;
small.height = grid;
const sctx = small.getContext("2d");

async function startCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: { ideal: 640 },
      height: { ideal: 480 },
      facingMode: "environment"
    },
    audio: false
  });
  video.srcObject = stream;
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function draw() {
  requestAnimationFrame(draw);

  if (video.readyState < 2) return;

  // ① カメラ映像を 24×24 に縮小
  sctx.drawImage(video, 0, 0, grid, grid);

  // ② 24×24 のピクセルを画面いっぱいに拡大描画
  const cellW = canvas.width / grid;
  const cellH = canvas.height / grid;

  const img = sctx.getImageData(0, 0, grid, grid).data;

  let i = 0;
  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {
      const r = img[i++];
      const g = img[i++];
      const b = img[i++];
      i++; // alpha

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
    }
  }
}

window.onresize = resize;

resize();
startCam();
draw();
</script>

</body>
</html>
