<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixcel Photo</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }

    #captureBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 3px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      z-index: 9999;
    }

    #modeBtns {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }

    .modeBtn {
      padding: 8px 14px;
      background: rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline style="display:none;"></video>
<canvas id="view"></canvas>

<!-- ピクセル数切り替え -->
<div id="modeBtns">
  <div class="modeBtn" onclick="setGrid(32)">32</div>
  <div class="modeBtn" onclick="setGrid(48)">48</div>
  <div class="modeBtn" onclick="setGrid(64)">64</div>
</div>

<!-- 撮影ボタン -->
<div id="captureBtn">📸</div>

<script>
let grid = 32; // ★ 初期値は 32
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");

let videoW = 640;
let videoH = 480;

// ぼやけた境界用の縮小キャンバス（動的に作り直す）
let small = document.createElement("canvas");
let sctx = small.getContext("2d");

function setGrid(n) {
  grid = n;
  small.width = grid;
  small.height = grid;
  sctx = small.getContext("2d");
}

async function startCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: { ideal: 640 },
      height: { ideal: 480 },
      facingMode: "environment"
    },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    videoW = video.videoWidth;
    videoH = video.videoHeight;
  };
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function draw() {
  requestAnimationFrame(draw);

  if (video.readyState < 2) return;

  // ★ カメラ映像のアスペクト比を保持して縮小
  const camRatio = videoW / videoH;
  const gridRatio = 1;

  let drawW, drawH;

  if (camRatio > gridRatio) {
    drawW = grid;
    drawH = grid / camRatio;
  } else {
    drawH = grid;
    drawW = grid * camRatio;
  }

  const offsetX = (grid - drawW) / 2;
  const offsetY = (grid - drawH) / 2;

  sctx.clearRect(0, 0, grid, grid);
  sctx.drawImage(video, offsetX, offsetY, drawW, drawH);

  const img = sctx.getImageData(0, 0, grid, grid).data;

  // ★ 正方形ピクセル
  const cell = Math.min(canvas.width / grid, canvas.height / grid);
  const px = (canvas.width - cell * grid) / 2;
  const py = (canvas.height - cell * grid) / 2;

  let i = 0;

  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {

      // 元の色
      let r = img[i++];
      let g = img[i++];
      let b = img[i++];
      i++;

      // ★ 周囲の色と混ぜる（にじみ）
      const mix = 0.25;
      const neighbors = [];

      if (x > 0) neighbors.push((y * grid + (x - 1)) * 4);
      if (x < grid - 1) neighbors.push((y * grid + (x + 1)) * 4);
      if (y > 0) neighbors.push(((y - 1) * grid + x) * 4);
      if (y < grid - 1) neighbors.push(((y + 1) * grid + x) * 4);

      let nr = 0, ng = 0, nb = 0;
      neighbors.forEach(idx => {
        nr += img[idx];
        ng += img[idx + 1];
        nb += img[idx + 2];
      });

      nr /= neighbors.length;
      ng /= neighbors.length;
      nb /= neighbors.length;

      r = r * (1 - mix) + nr * mix;
      g = g * (1 - mix) + ng * mix;
      b = b * (1 - mix) + nb * mix;

      // ★ ピクセル位置の揺らぎ
      const jitter = cell * 0.15;
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      // ★ 角丸ピクセル
      const xPos = px + x * cell + jx;
      const yPos = py + y * cell + jy;

      ctx.fillStyle = `rgb(${r},${g},${b})`;

      ctx.beginPath();
      ctx.roundRect(xPos, yPos, cell, cell, cell * 0.3);
      ctx.fill();
    }
  }
}

// ★ 撮影ボタン（年月日時分秒つき）
document.getElementById("captureBtn").onclick = () => {
  const now = new Date();
  const fileName =
    `pixcel_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_` +
    `${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}.png`;

  const link = document.createElement("a");
  link.download = fileName;
  link.href = canvas.toDataURL("image/png");
  link.click();
};

window.onresize = resize;

resize();
startCam();
draw();
</script>

</body>
</html>
